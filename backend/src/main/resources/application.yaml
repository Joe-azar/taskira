spring:
  application:
    name: taskira-api

  datasource:
    url: jdbc:postgresql://localhost:5432/taskira
    username: taskira
    password: taskira
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080